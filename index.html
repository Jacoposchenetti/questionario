<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questionario Tesi — Dati Demografici</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">Studio universitario</p>
        <h1>Questionario tesi</h1>
        <p class="subtitle">Compila i dati demografici in tre brevi sezioni. Le informazioni sono trattate in forma pseudonimizzata su database Firebase.</p>
      </header>

      <div class="progress-wrap" aria-label="Progresso compilazione" role="progressbar" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar" id="progress-bar" style="width:33%"></div>
      </div>
      <p class="progress-label" id="progress-label">Sezione 1 di 3</p>

      <form id="main-form" novalidate>

        <!-- STEP 1 -->
        <section class="card step-panel active" data-panel="1" aria-labelledby="s1-title">
          <h2 id="s1-title">Dati personali</h2>
          <div class="field-grid">

            <label class="field"><span>Nome</span>
              <input type="text" id="nome" name="nome" required maxlength="80" /></label>

            <label class="field"><span>Cognome</span>
              <input type="text" id="cognome" name="cognome" required maxlength="80" /></label>

            <label class="field"><span>Età</span>
              <input type="number" id="age" name="age" min="18" max="99" required /></label>

            <label class="field"><span>Genere</span>
              <select id="gender" name="gender" required>
                <option value="">Seleziona</option>
                <option value="femmina">Femmina</option>
                <option value="maschio">Maschio</option>
                <option value="non-binary">Non-binary</option>
                <option value="preferisco-non-rispondere">Preferisco non rispondere</option>
                <option value="altro">Altro</option>
              </select></label>

            <label class="field col-2">
              <span>Titolo di studio <em>(il livello che stai frequentando o l'ultimo conseguito)</em></span>
              <select id="education" name="education" required>
                <option value="">Seleziona</option>
                <optgroup label="Istruzione di base">
                  <option value="scuola-media">Licenza media</option>
                  <option value="diploma">Diploma superiore</option>
                </optgroup>
                <optgroup label="Laurea triennale">
                  <option value="triennale-1">Triennale — 1° anno</option>
                  <option value="triennale-2">Triennale — 2° anno</option>
                  <option value="triennale-3">Triennale — 3° anno</option>
                  <option value="triennale-fc">Triennale — fuori corso</option>
                  <option value="triennale-conseguita">Triennale conseguita</option>
                </optgroup>
                <optgroup label="Laurea magistrale / ciclo unico">
                  <option value="magistrale-1">Magistrale — 1° anno</option>
                  <option value="magistrale-2">Magistrale — 2° anno</option>
                  <option value="magistrale-fc">Magistrale — fuori corso</option>
                  <option value="ciclounico-1">Ciclo unico — 1° anno</option>
                  <option value="ciclounico-2">Ciclo unico — 2° anno</option>
                  <option value="ciclounico-3">Ciclo unico — 3° anno</option>
                  <option value="ciclounico-4">Ciclo unico — 4° anno</option>
                  <option value="ciclounico-5">Ciclo unico — 5° anno</option>
                  <option value="ciclounico-6">Ciclo unico — 6° anno</option>
                  <option value="ciclounico-fc">Ciclo unico — fuori corso</option>
                  <option value="magistrale-conseguita">Magistrale / ciclo unico conseguita</option>
                </optgroup>
                <optgroup label="Post-laurea">
                  <option value="dottorato">Dottorato</option>
                  <option value="specializzazione">Specializzazione</option>
                  <option value="master">Master</option>
                </optgroup>
                <option value="altro">Altro</option>
              </select></label>

            <label class="field col-2"><span>Occupazione</span>
              <select id="occupation" name="occupation" required>
                <option value="">Seleziona</option>
                <option value="studente">Studente</option>
                <option value="studente-lavoratore">Studente lavoratore</option>
                <option value="lavoratore">Lavoratore</option>
              </select></label>

          </div>

          <label class="consent">
            <input type="checkbox" id="consent" name="consent" required />
            <span>Acconsento all'uso dei miei dati per finalità di ricerca accademica, secondo l'informativa privacy.</span>
          </label>

          <p class="step-error" id="err-1" aria-live="assertive"></p>
          <div class="actions">
            <button type="button" id="btn-next-1">Avanti →</button>
          </div>
        </section>

        <!-- STEP 2 -->
        <section class="card step-panel" data-panel="2" aria-labelledby="s2-title" hidden>
          <h2 id="s2-title">Origini e formazione</h2>
          <div class="field-grid">

            <label class="field col-2"><span>Dove sei nato/a? <em>(città o paese)</em></span>
              <input type="text" id="birthPlace" name="birthPlace" maxlength="120" placeholder="es. Roma, Italia" /></label>

            <label class="field col-2"><span>Dove sei cresciuto/a? <em>(città o paese)</em></span>
              <input type="text" id="grewUpPlace" name="grewUpPlace" maxlength="120" placeholder="es. Milano, Italia" /></label>

            <label class="field col-2"><span>Titolo di studio della madre</span>
              <select id="motherEducation" name="motherEducation" required>
                <option value="">Seleziona</option>
                <option value="nessuno">Nessun titolo</option>
                <option value="elementare">Licenza elementare</option>
                <option value="media">Licenza media</option>
                <option value="diploma">Diploma superiore</option>
                <option value="triennale">Laurea triennale</option>
                <option value="magistrale">Laurea magistrale / ciclo unico</option>
                <option value="post-laurea">Post-laurea (dottorato, specializzazione, master)</option>
                <option value="non-so">Non so / Non disponibile</option>
              </select></label>

            <label class="field col-2"><span>Titolo di studio del padre</span>
              <select id="fatherEducation" name="fatherEducation" required>
                <option value="">Seleziona</option>
                <option value="nessuno">Nessun titolo</option>
                <option value="elementare">Licenza elementare</option>
                <option value="media">Licenza media</option>
                <option value="diploma">Diploma superiore</option>
                <option value="triennale">Laurea triennale</option>
                <option value="magistrale">Laurea magistrale / ciclo unico</option>
                <option value="post-laurea">Post-laurea (dottorato, specializzazione, master)</option>
                <option value="non-so">Non so / Non disponibile</option>
              </select></label>

          </div>

          <div id="student-fields" hidden>
            <hr />
            <h3>Informazioni sugli studi</h3>
            <div class="field-grid">

              <label class="field col-2"><span>Dove studi? <em>(città, università)</em></span>
                <input type="text" id="studyPlace" name="studyPlace" maxlength="120" placeholder="es. Trento, Università di Trento" /></label>

              <label class="field col-2"><span>Cosa studi?</span>
                <input type="text" id="studyField" name="studyField" maxlength="120" placeholder="es. Psicologia clinica" /></label>

            </div>
          </div>

          <p class="step-error" id="err-2" aria-live="assertive"></p>
          <div class="actions">
            <div class="nav-row">
              <button type="button" id="btn-back-2" class="btn-secondary">← Indietro</button>
              <button type="button" id="btn-next-2">Avanti →</button>
            </div>
          </div>
        </section>

        <!-- STEP 3 -->
        <section class="card step-panel" data-panel="3" aria-labelledby="s3-title" hidden>
          <h2 id="s3-title">Psicologia</h2>
          <div class="field-stack">

            <fieldset class="radio-group">
              <legend>Sei mai stato/a in terapia psicologica?</legend>
              <label class="radio-label"><input type="radio" name="hadTherapy" value="si" /> Sì</label>
              <label class="radio-label"><input type="radio" name="hadTherapy" value="no" /> No</label>
            </fieldset>

            <div id="therapy-duration-wrap" hidden>
              <label class="field">
                <span>Per quanto tempo complessivamente?</span>
                <select id="therapyDuration" name="therapyDuration">
                  <option value="">Seleziona</option>
                  <option value="lt6m">Meno di 6 mesi</option>
                  <option value="6m-1y">6 mesi – 1 anno</option>
                  <option value="1y-2y">1 – 2 anni</option>
                  <option value="2y-3y">2 – 3 anni</option>
                  <option value="gt3y">Più di 3 anni</option>
                </select>
              </label>
            </div>

            <label class="field">
              <span>Orientamento sessuale</span>
              <select id="sexualOrientation" name="sexualOrientation" required>
                <option value="">Seleziona</option>
                <option value="eterosessuale">Eterosessuale</option>
                <option value="omosessuale">Omosessuale / Gay / Lesbica</option>
                <option value="bisessuale">Bisessuale</option>
                <option value="pansessuale">Pansessuale</option>
                <option value="asessuale">Asessuale</option>
                <option value="preferisco-non-rispondere">Preferisco non rispondere</option>
                <option value="altro">Altro</option>
              </select>
            </label>

          </div>

          <p class="step-error" id="err-3" aria-live="assertive"></p>
          <div class="actions">
            <div class="nav-row">
              <button type="button" id="btn-back-3" class="btn-secondary">← Indietro</button>
              <button type="submit" id="submit-btn">Salva e invia</button>
            </div>
            <p id="status" class="status" role="status" aria-live="polite"></p>
          </div>
        </section>

      </form>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
